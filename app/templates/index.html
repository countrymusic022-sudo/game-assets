<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>台灣中文 Audio to Text</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="container">
      <h1>台灣中文聲音轉文字（SRT）</h1>
      <p>支援 WAV / MP3，上傳後自動辨識、分段與輸出時間軸字幕。</p>

      <form action="/transcribe" method="post" enctype="multipart/form-data" class="card">
        <label for="file">上傳音檔</label>
        <input id="file" type="file" name="file" accept=".wav,.mp3,audio/wav,audio/mpeg" required />
        <button type="submit">開始辨識</button>
      </form>

      {% if error %}
      <section class="card error">{{ error }}</section>
      {% endif %}

      {% if segments %}
      <section class="card">
        <h2>辨識結果（段落 + 時間軸）</h2>
        <ol class="segments">
          {% for seg in segments %}
          <li>
            <div class="time">{{ "%.2f"|format(seg.start) }}s → {{ "%.2f"|format(seg.end) }}s</div>
            <div class="text">{{ seg.text }}</div>
          </li>
          {% endfor %}
        </ol>
      </section>

      <section class="card">
        <h2>SRT 輸出</h2>
        <textarea rows="14" readonly>{{ srt }}</textarea>

        <form action="/download_srt" method="post">
          <input type="hidden" name="srt" value="{{ srt }}" />
          <input type="hidden" name="filename" value="{{ filename }}" />
          <button type="submit">下載 SRT</button>
        </form>
      </section>
      {% endif %}
    </main>
  </body>
</html>
